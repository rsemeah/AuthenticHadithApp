name: EAS Android Build & Submit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_submit:
    name: Build and Submit Android to Play Store
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./v0-authentic-hadith/expo-wrapper
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout v0-authentic-hadith (WebView wrapper source)
        uses: actions/checkout@v4
        with:
          repository: rsemeah/v0-authentic-hadith
          path: v0-authentic-hadith
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Set RevenueCat API keys
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            if (process.env.REVENUECAT_API_KEY_APPLE) {
              config.expo.extra.revenueCatApiKeyApple = process.env.REVENUECAT_API_KEY_APPLE;
            }
            if (process.env.REVENUECAT_API_KEY_GOOGLE) {
              config.expo.extra.revenueCatApiKeyGoogle = process.env.REVENUECAT_API_KEY_GOOGLE;
            }
            fs.writeFileSync('app.json', JSON.stringify(config, null, 2));
          "
        env:
          REVENUECAT_API_KEY_APPLE: ${{ secrets.REVENUECAT_API_KEY_APPLE }}
          REVENUECAT_API_KEY_GOOGLE: ${{ secrets.REVENUECAT_API_KEY_GOOGLE }}

      - name: Write Google Play service account key
        if: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY != '' }}
        run: echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}' > ./google-play-key.json

      - name: Login to EAS
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: eas whoami || true

      - name: Build Android (EAS)
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: eas build -p android --profile production --non-interactive

      - name: Submit to Google Play
        if: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY != '' }}
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: eas submit -p android --latest --non-interactive
