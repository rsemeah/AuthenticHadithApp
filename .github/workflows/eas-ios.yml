name: EAS iOS Build & Submit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_submit:
    name: Build and Submit iOS to TestFlight
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./v0-authentic-hadith/expo-wrapper
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout v0-authentic-hadith (WebView wrapper source)
        uses: actions/checkout@v4
        with:
          repository: rsemeah/v0-authentic-hadith
          path: v0-authentic-hadith
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Configure App Store Connect API key
        if: ${{ secrets.APPLE_API_KEY_JSON != '' }}
        run: |
          echo "Writing App Store Connect API key file"
          echo '${{ secrets.APPLE_API_KEY_JSON }}' > ./appstoreconnect.json

      - name: Set RevenueCat API keys
        run: |
          # Update app.json with production RevenueCat keys from secrets
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            if (process.env.REVENUECAT_API_KEY_APPLE) {
              config.expo.extra.revenueCatApiKeyApple = process.env.REVENUECAT_API_KEY_APPLE;
            }
            if (process.env.REVENUECAT_API_KEY_GOOGLE) {
              config.expo.extra.revenueCatApiKeyGoogle = process.env.REVENUECAT_API_KEY_GOOGLE;
            }
            fs.writeFileSync('app.json', JSON.stringify(config, null, 2));
          "
        env:
          REVENUECAT_API_KEY_APPLE: ${{ secrets.REVENUECAT_API_KEY_APPLE }}
          REVENUECAT_API_KEY_GOOGLE: ${{ secrets.REVENUECAT_API_KEY_GOOGLE }}

      - name: Login to EAS
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: eas whoami || true

      - name: Build iOS (EAS)
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: eas build -p ios --profile production --non-interactive

      - name: Submit to TestFlight
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          if [ -f ./appstoreconnect.json ]; then
            eas submit -p ios --latest --apple-api-key-path ./appstoreconnect.json --non-interactive
          else
            eas submit -p ios --latest --non-interactive --apple-id "${{ secrets.APPLE_ID }}" --apple-team-id "${{ secrets.APPLE_TEAM_ID }}"
          fi
